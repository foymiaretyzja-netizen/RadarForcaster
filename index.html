<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Weather & Terrain - Interactive</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js"></script>
    <script src="system/filter.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            overflow: hidden;
            font-family: sans-serif;
        }
        
        /* --- START MENU UI --- */
        #startMenu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #121212;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        #startMenu h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        #startMenu p {
            color: #aaaaaa;
            margin-bottom: 30px;
        }
        .resolution-buttons {
            display: flex;
            gap: 20px;
        }
        .res-btn {
            background-color: #2c3e50;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 5px;
        }
        .res-btn:hover {
            background-color: #34495e;
            transform: scale(1.05);
        }

        /* --- MAIN UI PANEL --- */
        .ui-panel {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            display: none; /* Hidden until game starts */
        }
        .ui-panel h1 {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
        }
        .controls {
            display: flex;
            gap: 10px;
        }
        button {
            background-color: #333;
            color: white;
            border: 1px solid #555;
            padding: 8px 16px;
            cursor: pointer;
            font-family: monospace;
            transition: all 0.2s;
        }
        button:hover {
            background-color: #555;
        }
        
        /* --- CANVAS --- */
        canvas {
            display: block;
            background-color: #000;
            cursor: grab;
        }
        canvas:active {
            cursor: grabbing;
        }
        .stats {
            margin-top: 10px;
            font-family: monospace;
            color: #aaaaaa;
        }
    </style>
</head>
<body>

    <div id="startMenu">
        <h1>Synoptic Weather Simulator</h1>
        <p>Select simulation fidelity. Lower resolutions improve physics performance.</p>
        <div class="resolution-buttons">
            <button class="res-btn" onclick="startGame('720p')">Start 720p (Fast)</button>
            <button class="res-btn" onclick="startGame('900p')">Start 900p (Balanced)</button>
        </div>
    </div>

    <div class="ui-panel" id="mainUI">
        <h1>Synoptic Weather Simulator</h1>
        <div class="controls">
            <button onclick="FilterSystem.setMode('composite')">Composite</button>
            <button onclick="FilterSystem.setMode('terrain')">Terrain Base</button>
            <button onclick="FilterSystem.setMode('temperature')">Thermal</button>
            <button onclick="FilterSystem.setMode('moisture')">Water Vapor</button>
        </div>
        <div class="stats" id="fpsCounter">FPS: 0 | Zoom: 1.0x</div>
    </div>

    <canvas id="weatherMap"></canvas>

    <script>
        const canvas = document.getElementById('weatherMap');
        const ctx = canvas.getContext('2d');
        const fpsCounter = document.getElementById('fpsCounter');
        const simplex = new SimplexNoise();

        // Canvas sizing
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Camera System
        let camera = { x: 0, y: 0, zoom: 1 };
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };

        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            dragStart.x = e.clientX - camera.x;
            dragStart.y = e.clientY - camera.y;
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isDragging) {
                camera.x = e.clientX - dragStart.x;
                camera.y = e.clientY - dragStart.y;
            }
        });

        canvas.addEventListener('mouseup', () => isDragging = false);
        canvas.addEventListener('mouseleave', () => isDragging = false);

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomAmount = -e.deltaY * 0.001;
            const newZoom = Math.max(0.2, Math.min(5.0, camera.zoom + zoomAmount));
            
            const mouseX = e.clientX;
            const mouseY = e.clientY;
            const worldX = (mouseX - camera.x) / camera.zoom;
            const worldY = (mouseY - camera.y) / camera.zoom;

            camera.zoom = newZoom;
            camera.x = mouseX - worldX * camera.zoom;
            camera.y = mouseY - worldY * camera.zoom;
        }, { passive: false });


        // Grid Configuration (Dynamic)
        let cols = 0; 
        let rows = 0; 
        const cellSize = 10;
        let grid = [];

        // --- BOOT SEQUENCE ---
        function startGame(resolution) {
            // 1. Set grid dimensions based on choice
            if (resolution === '720p') {
                cols = 128; // 1280 / 10
                rows = 72;  // 720 / 10
            } else if (resolution === '900p') {
                cols = 144; // 1440 / 10
                rows = 90;  // 900 / 10
            }

            // 2. Hide start menu, show main UI
            document.getElementById('startMenu').style.display = 'none';
            document.getElementById('mainUI').style.display = 'block';

            // 3. Initialize the grid and start loop
            initGrid();
            requestAnimationFrame(loop);
        }

        function initGrid() {
            for (let i = 0; i < cols; i++) {
                grid[i] = [];
                for (let j = 0; j < rows; j++) {
                    
                    let nx = i / cols - 0.5;
                    let ny = j / rows - 0.5;
                    
                    let e = 1.00 * simplex.noise2D(2 * nx, 2 * ny)
                          + 0.50 * simplex.noise2D(4 * nx, 4 * ny)
                          + 0.25 * simplex.noise2D(8 * nx, 8 * ny);
                    e = e / 1.75; 
                    let elevation = (e + 1) / 2; 

                    let baseTemp = 0;
                    let baseMoisture = 0;

                    if (elevation < 0.45) { 
                        let waterTempNoise = simplex.noise2D(1.5 * nx + 100, 1.5 * ny + 100);
                        baseTemp = 17.5 + (waterTempNoise * 12.5); 
                        baseMoisture = 1.0; 
                    } else { 
                        let landTempNoise = simplex.noise2D(2 * nx + 200, 2 * ny + 200);
                        baseTemp = 20 + (landTempNoise * 10);

                        if (elevation > 0.70) {
                            baseTemp -= (elevation - 0.70) * 50; 
                            baseMoisture = 0.1; 
                        } else if (elevation < 0.50) {
                            baseTemp += 5; 
                            baseMoisture = 0.8;
                        } else {
                            let moistureNoise = simplex.noise2D(3 * nx + 300, 3 * ny + 300);
                            baseMoisture = 0.45 + (moistureNoise * 0.25); 
                        }
                    }

                    grid[i][j] = {
                        elevation: elevation,
                        pressure: 1013, 
                        temperature: baseTemp,
                        baseTemp: baseTemp,    
                        humidity: baseMoisture,
                        baseMoisture: baseMoisture, 
                        windU: 0, 
                        windV: 0  
                    };
                }
            }
            // Center the camera on the generated map
            camera.x = (window.innerWidth / 2) - ((cols * cellSize) / 2);
            camera.y = (window.innerHeight / 2) - ((rows * cellSize) / 2);
        }

        // --- PHYSICS ENGINE ---
        function updatePhysics() {
            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    grid[i][j].temperature += (Math.random() - 0.5) * 0.5;
                    grid[i][j].temperature += (grid[i][j].baseTemp - grid[i][j].temperature) * 0.01;
                }
            }
        }

        // --- MAIN LOOP ---
        let lastTime = 0;
        let frames = 0;

        function loop(timestamp) {
            if (timestamp - lastTime >= 1000) {
                fpsCounter.innerText = `FPS: ${frames} | Zoom: ${camera.zoom.toFixed(2)}x`;
                frames = 0;
                lastTime = timestamp;
            }
            frames++;

            updatePhysics();
            
            ctx.setTransform(1, 0, 0, 1, 0, 0); 
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.translate(camera.x, camera.y);
            ctx.scale(camera.zoom, camera.zoom);

            FilterSystem.render(ctx, grid, cols, rows, cellSize);

            requestAnimationFrame(loop);
        }

    </script>
</body>
</html>
