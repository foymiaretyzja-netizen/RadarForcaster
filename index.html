<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Weather & Terrain - 900p</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js"></script>
    
    <script src="system/filter.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: sans-serif;
        }
        h1 {
            margin: 10px 0;
            font-size: 1.5rem;
        }
        .controls {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }
        button {
            background-color: #333;
            color: white;
            border: 1px solid #555;
            padding: 8px 16px;
            cursor: pointer;
            font-family: monospace;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #555;
        }
        canvas {
            width: 1440px;
            height: 900px;
            background-color: #000;
            border: 2px solid #333;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        .stats {
            margin-top: 10px;
            font-family: monospace;
            color: #aaaaaa;
        }
    </style>
</head>
<body>

    <h1>Synoptic Weather Simulator</h1>
    
    <div class="controls">
        <button onclick="FilterSystem.setMode('composite')">Composite (Radar)</button>
        <button onclick="FilterSystem.setMode('terrain')">Terrain Base</button>
        <button onclick="FilterSystem.setMode('temperature')">Thermal Camera</button>
        <button onclick="FilterSystem.setMode('moisture')">Water Vapor</button>
    </div>

    <canvas id="weatherMap" width="1440" height="900"></canvas>
    <div class="stats" id="fpsCounter">FPS: 0</div>

    <script>
        const canvas = document.getElementById('weatherMap');
        const ctx = canvas.getContext('2d');
        const fpsCounter = document.getElementById('fpsCounter');

        const simplex = new SimplexNoise();

        // Grid Configuration
        const cols = 144; 
        const rows = 90;  
        const cellSize = 10;
        let grid = [];

        function initGrid() {
            for (let i = 0; i < cols; i++) {
                grid[i] = [];
                for (let j = 0; j < rows; j++) {
                    
                    let nx = i / cols - 0.5;
                    let ny = j / rows - 0.5;
                    
                    // 1. Elevation
                    let e = 1.00 * simplex.noise2D(2 * nx, 2 * ny)
                          + 0.50 * simplex.noise2D(4 * nx, 4 * ny)
                          + 0.25 * simplex.noise2D(8 * nx, 8 * ny);
                    e = e / 1.75; 
                    let elevation = (e + 1) / 2; 

                    // 2. Base Properties (Thermal/Moisture anchors)
                    let baseTemp = 0;
                    let baseMoisture = 0;

                    if (elevation < 0.45) { // Water
                        let waterTempNoise = simplex.noise2D(1.5 * nx + 100, 1.5 * ny + 100);
                        baseTemp = 17.5 + (waterTempNoise * 12.5); 
                        baseMoisture = 1.0; 
                    } else { // Land
                        let landTempNoise = simplex.noise2D(2 * nx + 200, 2 * ny + 200);
                        baseTemp = 20 + (landTempNoise * 10);

                        if (elevation > 0.70) {
                            baseTemp -= (elevation - 0.70) * 50; 
                            baseMoisture = 0.1; 
                        } else if (elevation < 0.50) {
                            baseTemp += 5; 
                            baseMoisture = 0.8;
                        } else {
                            let moistureNoise = simplex.noise2D(3 * nx + 300, 3 * ny + 300);
                            baseMoisture = 0.45 + (moistureNoise * 0.25); 
                        }
                    }

                    // 3. Populate Cell
                    grid[i][j] = {
                        elevation: elevation,
                        pressure: 1013, 
                        temperature: baseTemp,
                        baseTemp: baseTemp,    
                        humidity: baseMoisture,
                        baseMoisture: baseMoisture, 
                        windU: 0, 
                        windV: 0  
                    };
                }
            }
        }

        // --- PHYSICS ENGINE ---

        function updatePhysics() {
            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    // Slight animation to prove physics loop is running
                    grid[i][j].temperature += (Math.random() - 0.5) * 0.5;
                    // Terrain pulls air temp back to baseline
                    grid[i][j].temperature += (grid[i][j].baseTemp - grid[i][j].temperature) * 0.01;
                }
            }
        }

        // --- MAIN LOOP ---

        let lastTime = 0;
        let frames = 0;

        function loop(timestamp) {
            if (timestamp - lastTime >= 1000) {
                fpsCounter.innerText = `FPS: ${frames}`;
                frames = 0;
                lastTime = timestamp;
            }
            frames++;

            // 1. Calculate physics
            updatePhysics();
            
            // 2. Delegate rendering to the filter.js tool
            FilterSystem.render(ctx, grid, cols, rows, cellSize);

            requestAnimationFrame(loop);
        }

        // Boot Sequence
        initGrid();
        requestAnimationFrame(loop);

    </script>
</body>
</html>
